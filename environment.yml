name: trading-system
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12

  # Core data
  - pandas>=2.2
  - numpy>=1.26
  - pyyaml>=6.0
  - python-dotenv>=1.0

  # HTTP client (Telegram)
  - httpx>=0.27

  # Testing
  - pytest>=8.1
  - pytest-cov>=5.0

  # Plotting
  - plotly>=5.20

  # Data download
  - requests>=2.32
  - tqdm>=4.66

  # pip-only packages
  - pip:
      - ta>=0.11.0
      - yfinance>=0.2.54
      - pytest-asyncio>=0.23
