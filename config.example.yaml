# ─────────────────────────────────────────────────────────────────────────────
# Trading System — Configuration Example
# Copy this file to config.yaml and fill in your credentials.
# NEVER commit config.yaml with real credentials to version control.
# ─────────────────────────────────────────────────────────────────────────────

# ── Trading Pairs ─────────────────────────────────────────────────────────────
trading_pairs:
  - symbol: "XAUUSD"
    timeframes: ["H1", "H4"]
    strategies: ["SonicR", "HiddenDivergence", "MACDCrossover"]
  - symbol: "EURUSD"
    timeframes: ["H1", "H4"]
    strategies: ["SonicR", "HiddenDivergence"]
  - symbol: "GBPUSD"
    timeframes: ["H1"]
    strategies: ["SonicR", "HiddenDivergence", "RSI_EMA"]

# ── Risk Management ───────────────────────────────────────────────────────────
risk_management:
  account_balance: 10000        # USD — update before each session
  risk_per_trade_percent: 1.5   # % account risked per trade
  default_rr_ratio: 2           # Reward:Risk ratio (TP = SL × rr_ratio)
  max_concurrent_trades: 3      # Max open signals at once
  min_lot_size: 0.01
  max_lot_size: 10.0

# ── Session & news blackout (không vào lệnh trong các khung giờ sau) ───────────
# Áp dụng cho mọi strategy qua BaseStrategy (backtest + live).
# Thời gian mặc định: UTC (khớp timestamp CSV).
session_filters:
  enabled: false                    # true = bật lọc
  # Thứ Hai: không vào lệnh trong N giờ đầu (UTC), vd. 00:00–02:00
  monday_avoid_first_hours: 2
  # Thứ Sáu: không vào lệnh trong N giờ cuối trước khi đóng phiên tuần (FX thường 21:00 UTC)
  friday_avoid_hours_before_week_close: 5
  friday_week_close_hour_utc: 21
  friday_week_close_minute_utc: 0
  # Tin tức mạnh: tránh ± N giờ quanh mỗi mốc (file CSV, cột datetime_utc)
  news_margin_hours: 1
  news_events_file: "data/news_events.csv"   # copy từ news_events.example.csv và cập nhật lịch

# ── MetaTrader5 ───────────────────────────────────────────────────────────────
# Chỉ Windows + terminal MT5 đang mở (đã login). Cài: pip install MetaTrader5
# Bật dữ liệu thật: đặt data.fallback_source khác "mock" (vd. "mt5" bên dưới).
# Có thể override: MT5_LOGIN, MT5_PASSWORD, MT5_SERVER
mt5:
  login: 12345678
  password: "YOUR_MT5_PASSWORD"
  server: "Exness-MT5Real"      # e.g. ICMarketsSC-Demo, Exness-MT5Real
  timeout: 60000                # ms

# ── Telegram ──────────────────────────────────────────────────────────────────
# Bot gửi tín hiệu (HTML): Entry, SL (stop loss), TP1/TP2 (take profit), volume, risk.
# Override bằng biến môi trường: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
telegram:
  bot_token: "YOUR_BOT_TOKEN"   # Từ @BotFather
  # chat_id đích nhận tin:
  # - Chat riêng / nhóm: số ID (vd. dùng @userinfobot)
  # - Kênh (channel): thêm bot làm Admin (Post messages), rồi dùng ID dạng -100xxxxxxxxxx
  #   (Forward tin từ kênh tới @getidsbot / @RawDataBot để lấy id) hoặc @ten_kenh_public
  chat_id: "YOUR_CHAT_ID_OR_CHANNEL_ID"
  parse_mode: "HTML"
  cooldown_seconds: 60          # Không gửi trùng tín hiệu trong N giây
  # true = sau khi enqueue tín hiệu Telegram đầu tiên (có SL/TP), dừng main.py (tiện test)
  stop_after_first_signal: false
  # Paper / test: sau tín hiệu đầu, theo dõi nến đóng — chạm TP1 hoặc SL (ưu tiên giống backtest)
  paper_track_tp_sl: false
  notify_on_tp_hit: true        # Gửi Telegram khi chạm TP (paper)
  notify_on_sl_hit: false       # Gửi Telegram khi chạm SL (paper)
  stop_after_tp_hit: false      # true = dừng main sau khi TP (paper)
  stop_after_sl_hit: false      # true = dừng main sau khi SL (paper)

# ── Strategies ────────────────────────────────────────────────────────────────
strategies:
  HiddenDivergence:
    max_concurrent_trades: 1        # 1 = wait for current trade to close before new entry
    rsi_period: 14                  # RSI lookback period
    ema_fast: 34                    # EMA value zone (PAC midline)
    ema_slow: 89                    # Trend anchor EMA
    ema_trend: 200                  # Macro trend filter
    atr_period: 14
    swing_lookback: 60              # Bars scanned for swing-point detection
    swing_strength: 3               # Bars each side required to confirm swing
    min_swing_separation_bars: 10   # Min bars between đỉnh1–đỉnh2 / đáy1–đáy2 (0 = tắt)
    max_swing_separation_bars: 18   # Max gap (~10–15 on chart); 0 = unlimited
    require_clean_segment_between_swings: true  # No interior high above High2 / low below Low2
    require_swing2_curr_or_prev: false  # true = Low2/High2 only on curr/prev bar
    sl_buffer_atr: 0.3              # ATR padding on SL (placed at High1/Low1)
    min_rr: 1.5                     # Minimum estimated reward-to-risk ratio
    # ── Limit-order entry (Phân kỳ ẩn + retest) ───────────────────────────────
    limit_entry: true               # Place limit at swing level instead of market
    limit_entry_mode: "swing"       # "swing"=at Low2/High2  "ema34"=at EMA34
    limit_expiry_bars: 10           # Cancel if unfilled within N bars
    # ── RSI-50 filters (Golden Combo) ─────────────────────────────────────────
    rsi_buy_floor: 40.0             # RSI at Low2 must be above this (BUY filter)
    rsi_sell_ceil: 60.0             # RSI at High2 must be below this (SELL filter)
    # ── Entry candle (only applies when limit_entry=false) ────────────────────
    require_strong_candle: false    # Candle confirmation not needed for limit mode
    strong_candle_ratio: 0.4        # Min body/range ratio (0.4 = 40%)
    # ── EMA Confluence (set true for max accuracy, fewer trades) ─────────────
    require_ema_confluence: false   # 2nd swing must be near EMA34 or EMA89
    ema_confluence_atr: 1.0         # ATR tolerance for confluence check

  MACDCrossover:
    fast_period: 12
    slow_period: 26
    signal_period: 9
    min_histogram_threshold: 0.0  # Minimum MACD histogram value to confirm signal

  RSI_EMA:
    rsi_period: 14
    ema_fast: 9
    ema_slow: 21
    rsi_overbought: 70
    rsi_oversold: 30

  SonicR:
    allowed_timeframes: ["H1", "H4"]   # chỉ chạy trên H1/H4; [] = mọi TF
    allowed_symbols: ["XAUUSD", "EURUSD", "GBPUSD"]   # [] = mọi symbol
    ema_fast: 34                    # EMA cluster ngắn hạn
    ema_slow: 89                    # EMA cluster dài hạn (xu hướng chính)
    atr_period: 14
    atr_mult_far: 2.0               # Hệ số ATR xác định "far value zone"
    sl_buffer_atr: 0.3              # Buffer ATR khi đặt SL
    min_ema_separation_atr: 0.5     # Khoảng tối thiểu EMA34–EMA89 / ATR (lọc sideway)
    slope_lookback: 5               # Số nến đo slope EMA89
    pullback_lookback: 30           # Cửa sổ tìm pullback / correction
    extension_lookback: 20          # Cửa sổ tìm extension trước pullback
    ema89_touch_atr: 0.5            # Khoảng dung sai ATR cho "chạm EMA89"
    # Bộ lọc tối ưu (set to false để tắt từng filter)
    require_ema89_touch: true       # Pullback phải đạt đến vùng EMA89
    require_ema89_rejection: true   # Nến vào lệnh phải bị từ chối tại EMA89
    require_strong_candle: true     # Thân nến > strong_candle_ratio × range
    strong_candle_ratio: 0.5        # Tỷ lệ tối thiểu thân/range (0.5 = 50%)
    min_rr: 1.0                     # RR tối thiểu để chấp nhận lệnh
    # ── Limit-order entry optimisation ──────────────────────────────────────────
    limit_entry: true               # Chờ giá về EMA34 thay vì vào lệnh thị trường
    limit_expiry_bars: 10           # Hủy lệnh nếu không fill trong N nến
    # Sideways Oscillation Signal
    enable_sw_signal: true          # Bật tín hiệu sw đi quanh EMA34
    sw_lookback: 30                 # Số nến tối thiểu để xác nhận sideway
    sw_min_crosses: 3               # Số lần giá cắt qua EMA34 tối thiểu
    sw_max_range_atr: 4.0           # Range tối đa tính theo ATR
    # ── Bộ lọc tối ưu v2 ────────────────────────────────────────────────────────
    # (1) Breakout: bỏ qua nếu giá cách EMA200 quá xa (pips cố định, 0 = tắt)
    breakout_max_ema200_dist_pips: 0
    # (2) Rejection: SL đệm thêm để tránh bị quét bởi nhiễu (tính theo ATR, thêm vào sl_buffer_atr)
    rejection_extra_sl_atr: 0.0
    # (3) Max SL cứng: bỏ lệnh có SL rộng hơn ngưỡng này pips (0 = tắt)
    max_sl_pips: 0
    # (4) Trailing Break-even: dời SL về hoà vốn khi lãi ≥ N lần SL (0 = tắt; 1.0 = +1R)
    breakeven_at_r: 0.0
    # (5) Ưu tiên Rejection (SL ngắn hơn, RR tốt hơn): true = Rejection TRƯỚC Breakout
    rejection_priority: false
    # ── Opt-13: Absolute EMA Gap Filter ─────────────────────────────────────────────
    # Khoảng cách tuyệt đối (pips) giữa EMA34 và EMA89; 0 = tắt
    min_ema_gap_pips: 0.0
    # ── Opt-14: Minimum SL Width ─────────────────────────────────────────────────────
    # SL tối thiểu pips; 0 = tắt; 150 pips cho M5 XAUUSD
    min_sl_pips: 0.0
    # ── Opt-15: Higher Timeframe EMA Bias Filter ─────────────────────────────────────
    # false = tắt; true cho M5 (resample M5→H1, check EMA34/89 H1)
    htf_ema_filter: false
    htf_resample: "1h"     # "1h"=H1, "4h"=H4, "1D"=D1
    htf_ema_fast: 34
    htf_ema_slow: 89
    htf_require_close_vs_ema: false   # true = close(H1) phải đúng bên EMA34(H1)
    # ── Bộ lọc tối ưu v3 ────────────────────────────────────────────────────────
    # Opt-1: EMA Dual Slope Filter
    require_ema_slope: false        # true = bật; chỉ vào lệnh khi EMA34+EMA89 đang dốc
    min_slope_pips_per_bar: 0.5     # ngưỡng XAUUSD H1 (~30°); giảm xuống nếu lọc quá nhiều
    # Opt-2: Swing-based ATR SL (SL = Swing + N×ATR)
    use_swing_sl: false             # true = bật; false = dùng PAC band như cũ
    swing_sl_lookback: 10           # số nến nhìn lại để tìm swing high/low
    swing_sl_atr_mult: 1.5          # khoảng đệm (1.5 = vàng cần "thở")
    # Opt-3: Three-Bar Confirmation (Marubozu ngay | đợi retest)
    require_bo_confirmation: false  # true = bật; false = vào theo logic breakout gốc
    bo_marubozu_ratio: 0.8          # thân ≥ 80% range → chấp nhận vào ngay (Marubozu)
    # Opt-4: ATR-based SL (SL = Entry ± N×ATR) — ghi đè PAC/Swing SL
    use_atr_sl: false               # true = SL = Entry ± atr_sl_mult × ATR; false = PAC/Swing
    atr_sl_mult: 1.5                # hệ số N; 1.5 phù hợp M15, 2.0 cho H1 nếu muốn rộng hơn
    # Opt-5: Close-confirmation touch — không vào lệnh chỉ vì wick chạm EMA
    use_close_for_ema_touch: false  # true = dùng close; false = dùng low/high (wick) như cũ

  # SonicRFund = SonicR + bộ lọc v3 đầy đủ (PAC Fanning, Partial Close, Candle Confirm, ATR-EMA200)
  SonicRFund:
    allowed_timeframes: ["H1", "H4"]   # chỉ chạy trên H1/H4
    allowed_symbols: ["XAUUSD"]
    ema_fast: 34
    ema_slow: 89
    ema_trend: 200
    atr_period: 14
    atr_mult_far: 2.0
    sl_buffer_atr: 0.3
    min_ema_separation_atr: 0.5
    slope_lookback: 5
    pullback_lookback: 30
    extension_lookback: 20
    enable_pac_signals: true
    vol_ma_len: 60
    avg_body_len: 20
    vol_ratio_breakout: 0.9
    vol_ratio_rejection: 0.8
    strong_body_ratio_avg: 0.8
    ema89_touch_atr: 0.5
    require_ema89_touch: true
    require_ema89_rejection: true
    require_strong_candle: true
    strong_candle_ratio: 0.5
    enable_sw_signal: true
    sw_lookback: 30
    sw_min_crosses: 3
    sw_max_range_atr: 4.0
    min_rr: 1.0
    limit_entry: true
    limit_expiry_bars: 10
    # v2 filters
    breakout_max_ema200_dist_atr: 3.0   # N×ATR, >0 overrides pips
    breakout_max_ema200_dist_pips: 400  # fallback
    rejection_extra_sl_atr: 0.0
    max_sl_pips: 0
    breakeven_at_r: 0.0                 # off — dùng partial close
    rejection_priority: false
    # v3 filters
    require_pac_fanning: false          # true = bật slope filter
    pac_fan_lookback: 5
    breakout_min_close_body_pct: 0.0    # 0.3 = 30% thân nến ngoài PAC
    breakout_max_counter_wick: 0.0      # 0.4 = 40% full-range
    partial_close_at_r: 0.0            # 1.0 = chốt 50% tại +1R
    partial_close_ratio: 0.5
    partial_trail_pips: 5.0

  SonicRM15:
    allowed_timeframes: ["M15"]        # chỉ chạy trên M15
    allowed_symbols: ["XAUUSD"]
    # ── SonicR M15 — ba tối ưu bật sẵn ────────────────────────────────────────
    # Opt-1 EMA Slope, Opt-4 ATR SL, Opt-5 Close-confirmation touch.
    # Các tham số này ghi đè _M15_DEFAULTS trong SonicRM15Strategy.__init__.

    # ── Opt-1: EMA Slope ──────────────────────────────────────────────────────
    require_ema_slope: true
    min_slope_pips_per_bar: 0.2        # 0.2 pips/bar ≈ 30° trên M15 XAUUSD
    slope_lookback: 10                 # 10 nến M15 ≈ 2.5 h

    # ── Opt-4: ATR SL ─────────────────────────────────────────────────────────
    use_atr_sl: true
    atr_sl_mult: 1.5                   # SL = Entry ± 1.5 × ATR_M15

    # ── Opt-5: Close-confirmation touch ───────────────────────────────────────
    use_close_for_ema_touch: true      # không vào lệnh chỉ vì wick chạm EMA

    # ── Entry ─────────────────────────────────────────────────────────────────
    limit_entry: false                 # market order sau khi close xác nhận

    # ── Lookback ──────────────────────────────────────────────────────────────
    pullback_lookback: 60
    extension_lookback: 40

    # ── Misc ──────────────────────────────────────────────────────────────────
    rejection_priority: true
    enable_sw_signal: false
    max_sl_pips: 0
    breakeven_at_r: 1.0
    min_rr: 1.5

  SonicRM5:
    allowed_timeframes: ["M5"]         # chỉ chạy trên M5
    allowed_symbols: ["XAUUSD"]
    # ── SonicR M5 — bốn tối ưu bật sẵn ────────────────────────────────────────
    # Opt-1 EMA Slope, Opt-3 Marubozu BO confirmation, Opt-4 ATR SL, Opt-5 Close-touch.
    # Các tham số này ghi đè _M5_DEFAULTS trong SonicRM5Strategy.__init__.

    # ── Opt-1: EMA Slope ──────────────────────────────────────────────────────
    require_ema_slope: true
    min_slope_pips_per_bar: 0.1        # 0.1 pips/bar cho M5 XAUUSD
    slope_lookback: 30                 # 30 nến M5 ≈ 2.5 h

    # ── Opt-3: Marubozu Confirmation (PAC Breakout) ───────────────────────────
    require_bo_confirmation: true      # M5 fakeout rất nhiều → bắt buộc xác nhận
    bo_marubozu_ratio: 0.75            # thân ≥ 75% range → coi là Marubozu

    # ── Opt-4: ATR SL ─────────────────────────────────────────────────────────
    use_atr_sl: true
    atr_sl_mult: 1.5                   # SL = Entry ± 1.5 × ATR_M5

    # ── Opt-5: Close-confirmation touch ───────────────────────────────────────
    use_close_for_ema_touch: true      # không vào lệnh chỉ vì wick chạm EMA

    # ── Opt-11: LinReg Slope (~20°) ───────────────────────────────────────────
    use_linreg_slope: true
    linreg_slope_lookback: 20          # 20 nến M5 ≈ 1.7 h
    linreg_slope_thresh: 0.3           # 0.3 pips/bar ≈ 20° trên XAUUSD M5

    # ── Opt-13: Absolute EMA Gap Filter ───────────────────────────────────────
    # Khoảng cách EMA34–EMA89 phải > 50 pips — tránh sideway hoàn toàn
    min_ema_gap_pips: 50.0

    # ── Opt-14: Minimum SL Width ──────────────────────────────────────────────
    # SL tối thiểu 150 pips — đủ "thở" cho XAUUSD M5
    min_sl_pips: 150.0

    # ── Opt-15: Higher Timeframe (H1) EMA Bias Filter ─────────────────────────
    # Resample M5 → H1; BUY chỉ khi EMA34(H1) > EMA89(H1), SELL ngược lại
    htf_ema_filter: true
    htf_resample: "1h"
    htf_ema_fast: 34
    htf_ema_slow: 89
    htf_require_close_vs_ema: true    # close(H1) > EMA34(H1) cho BUY / < cho SELL

    # ── Entry ─────────────────────────────────────────────────────────────────
    limit_entry: false                 # market order sau khi close xác nhận

    # ── Lookback (×12 vs H1, ×3 vs M15) ──────────────────────────────────────
    pullback_lookback: 120             # 120 M5 ≈ 10 h
    extension_lookback: 60             # 60 M5 ≈ 5 h

    # ── Misc ──────────────────────────────────────────────────────────────────
    rejection_priority: true
    enable_sw_signal: false            # tắt — M5 quá nhiều noise sideways
    max_sl_pips: 0
    breakeven_at_r: 1.0                # dời SL về entry khi đạt +1R
    min_rr: 1.5

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  historical_dir: "data/historical"
  # bars_to_load: How many past bars to load on startup for indicator warmup
  warmup_bars: 200
  # Windows + MT5: đặt "mt5" (hoặc bất kỳ giá trị nào KHÁC "mock") để dùng copy_rates thật.
  # macOS/Linux dev: giữ "mock" (hoặc không có MT5).
  fallback_source: "mock"
  # MT5: khoảng cách mỗi lần hỏi API (giây). Mỗi lần lấy 2 nến; nến đóng mới → strategy.
  # Không phải “1 nến/giây” — khung thời gian nến vẫn là M5/H1/… trong trading_pairs.
  poll_interval_seconds: 1
  # Buffer OHLCV trong RAM (tối đa). Vượt quá → các nến cũ append ra CSV (tránh OOM khi chạy lâu).
  buffer_max_bars: 5000
  buffer_spill_enabled: true
  buffer_spill_dir: "data/live_buffer"
  # Mock-only: delay between synthetic bars (default: use poll_interval_seconds).
  # Set e.g. 0.05 for fast local testing (Telegram / strategy) without waiting for real bar times.
  # mock_poll_interval_seconds: 0.05
  # INFO log every N poll iterations (0 = chỉ dùng DEBUG để xem từng poll). Giảm xuống 1 nếu cần log mỗi lần poll.
  poll_log_every_n: 20
  # INFO every N bars handed to strategies (main.py). 0 = off. DEBUG: per-bar feed + per-strategy exec.
  strategy_eval_log_every_n: 20
  # Mock: replay newest CSV bars — max window, initial seed count, then stream rest (no more bars when done).
  mock_replay_from_historical: true
  mock_replay_max_bars: 2000
  mock_replay_seed_bars: 200

# ── Backtest ──────────────────────────────────────────────────────────────────
backtest:
  initial_cash: 10000
  commission_percent: 0.0       # 0 for Forex (spread-based)
  slippage_pips: 2              # Slippage simulation
  output_dir: "backtest_results"
  # % risk tính trên equity hiện tại (initial + PnL đã chốt), không cố định initial_cash
  risk_on_equity: true
  # Hủy LIMIT chưa khớp khi nến nằm trong khung cuối phiên Thứ Sáu (UTC, giống session_filters)
  # — cần session_filters.friday_avoid_hours_before_week_close > 0
  cancel_pending_limits_in_friday_close_window: false
  # Ranh giới “1 ngày” cho max drawdown trong ngày (IANA timezone)
  daily_drawdown_tz: "Asia/Ho_Chi_Minh"

# ── Concurrency ───────────────────────────────────────────────────────────────
concurrency:
  # Number of worker threads for parallel strategy evaluation.
  # With Python 3.13t/3.14t (no-GIL), these run truly in parallel.
  strategy_workers: 4
  data_workers: 4

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"                 # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/trading.log"
  max_bytes: 10485760           # 10 MB
  backup_count: 5
